<body>


  <header>
    <nav>
      <div class="name">♫ 熱音俱樂部</div>
      <ul class="nav-ul">
        <li><a href="index.html">首頁</a></li>
        <li><a href="music_video.html">音樂推薦</a></li>
        <li><a href="join.html" class="active">加入我們</a></li>
      </ul>
    </nav>
  </header>


  <section class="info">
    <h2>加入熱音俱樂部</h2>
    <p>熱愛音樂的你，準備好與志同道合的發燒友一起討論、聽歌、辦活動了嗎？</p>
    <p>填寫以下簡單表格，幾分鐘內即可成為正式會員！</p>
  </section>

  <!-- join form -->
  <section class="join-section">
    <div class="join-form">
      <h3>會員申請表格</h3>

      <form action="#" method="post" id="joinForm" enctype="multipart/form-data">

        <div class="form-group">
          <label for="name">姓名 <span style="color:#e94560;">*</span></label>
          <input type="text" id="name" name="name" required placeholder="請輸入你的姓名">
        </div>

        <div class="form-group">
          <label for="email">電郵 <span style="color:#e94560;">*</span></label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label for="phone">電話</label>
          <input type="tel" id="phone" name="phone" placeholder="1234 5678">
        </div>

        <div class="form-group">
          <label>你最感興趣的音樂類型（可複選）</label>
          <div>
            <div class="checkbox-item">
              <input type="checkbox" id="pop" name="interest" value="流行音樂">
              <label for="pop">流行音樂</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="indie" name="interest" value="冷門/獨立音樂">
              <label for="indie">冷門 / 獨立音樂</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="rock" name="interest" value="搖滾音樂">
              <label for="rock">搖滾音樂</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="electronic" name="interest" value="電子音樂">
              <label for="electronic">電子音樂</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="jazz" name="interest" value="爵士 / Blues">
              <label for="jazz">爵士 / Blues</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="hifi" name="interest" value="音訊設備 / Hi-Fi">
              <label for="hifi">音訊設備 / Hi-Fi</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="other" name="interest" value="其他">
              <label for="other">其他</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="message">為什麼想加入我們？（選填）</label>
          <textarea id="message" name="message" rows="4" placeholder="例如：想認識更多音樂朋友、想參加 Live 演出..."></textarea>
        </div>
        <!-- submit button -->
        <button type="submit" class="button">提交申請</button>
      </form>

      <p class="note">提交後我們會在 1-2 個工作天內以電郵回覆確認。<br>所有資料只用於會員聯絡，絕不外洩。</p>
    </div>
  </section>



  <footer>
    <div class="content">
      <div>
        <h4>熱音俱樂部</h4>
        <p>水炭宏茶街87號 菊花漆大廈9樓A-B室</p>
        <p>聯絡電話: 3150 0435</p>
      </div>
    </div>
    <p class="copyright">© 2026 熱音俱樂部 All Rights Reserved.</p>
  </footer>
  <script src="join.js"></script>

</body>

</html>
